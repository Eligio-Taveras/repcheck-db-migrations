name: CI

on:
  push:
    branches: [main, "feature/**", "feat/**", "fix/**", "chore/**", "claude/**", "dev/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_USERNAME: ${{ github.actor }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Check formatting (Scalafmt)
        run: sbt scalafmtCheckAll

      - name: Compile all subprojects (WartRemover + tpolecat)
        run: sbt "changesets/compile" "runner/compile" "app/compile"

      - name: Check Scalafix rules
        run: sbt "scalafixAll --check"

      - name: Run tests with coverage
        run: sbt coverage "runner/test" "runner/coverageReport"

      - name: Build Docker image (validation only, no push)
        run: sbt "app/Docker/stage"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
