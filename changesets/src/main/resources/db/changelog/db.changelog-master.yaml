databaseChangeLog:
  - changeSet:
      id: 001-initial-schema
      author: repcheck
      comment: "Initial RepCheck schema — 24 tables covering Congress.gov entities, LLM analysis, scoring, and pipeline tracking"
      changes:
        - sqlFile:
            path: changes/001-initial-schema.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 002-schema-expansion
      author: repcheck
      comment: "Schema expansion — adds reasoning to score_history, text availability tracking, and amendment tables"
      changes:
        - sqlFile:
            path: changes/002-schema-expansion.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 003-text-sections-concept-groups
      author: repcheck
      comment: "Section-level text storage with embeddings and first-class concept groups decoupled from analysis runs"
      changes:
        - sqlFile:
            path: changes/003-text-sections-concept-groups.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 004-question-bank
      author: repcheck
      comment: "Pre-tagged question bank for user political stance collection — questions, topic mappings, answer options, user responses"
      changes:
        - sqlFile:
            path: changes/004-question-bank.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 005-analysis-schema-alignment
      author: repcheck
      comment: "Align schema with Component 10 LLM Analysis spec — finding_types INT PK, bill_analyses expansion, pass_number on analysis tables"
      changes:
        - sqlFile:
            path: changes/005-analysis-schema-alignment.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 006-amendment-vote-linkage
      author: repcheck
      comment: "Link amendment votes to amendments — adds amendment_id to votes/vote_history/member_bill_stances, plus amendment_concept_summaries table for amendment-level explanations"
      changes:
        - sqlFile:
            path: changes/006-amendment-vote-linkage.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 007-amendment-text-support
      author: repcheck
      comment: "Amendment text ingestion — adds text fields to amendments table and creates amendment_text_versions for append-only text storage"
      changes:
        - sqlFile:
            path: changes/007-amendment-text-support.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 008-score-reasoning
      author: repcheck
      comment: "Add reasoning TEXT and reasoning_embedding vector(1536) to scores, reasoning_embedding to score_history for searchable alignment explanations"
      changes:
        - sqlFile:
            path: changes/008-score-reasoning.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 009-scoring-architecture
      author: repcheck
      comment: "Batch scoring architecture — 5 new tables (pairings, stance topics, alignments, materialization status) plus score status/overlap fields"
      changes:
        - sqlFile:
            path: changes/009-scoring-architecture.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 010-bill-subject-history-embedding
      author: repcheck
      comment: "Add embedding column to bill_subject_history to match bill_subjects table"
      changes:
        - sqlFile:
            path: changes/010-bill-subject-history-embedding.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 011-pk-standardization
      author: repcheck
      comment: "Standardize all PKs to id BIGSERIAL — TEXT PKs get natural_key, UUID PKs replaced, composite PKs get id + UNIQUE constraint, all FKs converted to BIGINT"
      changes:
        - sqlFile:
            path: changes/011-pk-standardization.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 012-placeholder-and-workflow-columns
      author: repcheck
      comment: "Relax NOT NULL for placeholder support on natural_key tables; add retry/audit columns and upsert constraint to workflow_run_steps"
      changes:
        - sqlFile:
            path: changes/012-placeholder-and-workflow-columns.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 013-enum-type-constraints
      author: repcheck
      comment: "Convert all finite-value TEXT columns to PostgreSQL ENUM types — 25 enum types covering legislative, analysis, scoring, and pipeline domains"
      changes:
        - sqlFile:
            path: changes/013-enum-type-constraints.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 014-state-column-normalization
      author: repcheck
      comment: "Normalize state columns to 2-letter codes matching us_states.state_code PK; add FK constraints on non-history tables"
      changes:
        - sqlFile:
            path: changes/014-state-column-normalization.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 015-remove-bills-text-embedding
      author: repcheck
      comment: "Remove redundant text_embedding from bills — canonical location is bill_text_versions.embedding (linked via latest_text_version_id FK)"
      changes:
        - sqlFile:
            path: changes/015-remove-bills-text-embedding.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 016-expand-text-version-code-enum
      author: repcheck
      comment: "Add 10 new text version codes from Congress.gov API — PCS, PCH, PL, RDS, RDH, RTS, RTH, ATS, ATH, PP"
      changes:
        - sqlFile:
            path: changes/016-expand-text-version-code-enum.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 017a-add-completed-with-errors-enum
      author: repcheck
      runInTransaction: false
      comment: "Add completed_with_errors to workflow_status_type enum (must run outside transaction)"
      changes:
        - sqlFile:
            path: changes/017a-add-completed-with-errors-enum.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 017b-collapse-pipeline-runs
      author: repcheck
      comment: "Collapse pipeline_runs into workflow_run_steps — two-table execution tracking model, add item counts, migrate processing_results FK"
      changes:
        - sqlFile:
            path: changes/017b-collapse-pipeline-runs.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 018-expand-lis-members
      author: repcheck
      comment: "Add first_name, last_name, party, state, last_verified columns to lis_members table"
      changes:
        - sqlFile:
            path: changes/018-expand-lis-members.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: true

  - changeSet:
      id: 019-restore-member-party-history-unique
      author: repcheck
      comment: "Restore uq_member_party_history UNIQUE (member_id, start_year) dropped as a side-effect of migration 011's TEXT->BIGINT column rebuild"
      changes:
        - sqlFile:
            path: changes/019-restore-member-party-history-unique.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 020-widen-member-party-history-unique
      author: repcheck
      comment: "Widen uq_member_party_history to UNIQUE (member_id, start_year, party_name) so intra-year party switches are preserved instead of silently dropped by ON CONFLICT DO NOTHING"
      changes:
        - sqlFile:
            path: changes/020-widen-member-party-history-unique.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 021-expand-text-version-code-enum
      author: repcheck
      comment: "Add 3 new text version codes from Congress.gov API — RCH (Reference Change House), EAS (Engrossed Amendment Senate), RIS (Referral Instructions Senate)"
      changes:
        - sqlFile:
            path: changes/021-expand-text-version-code-enum.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false
