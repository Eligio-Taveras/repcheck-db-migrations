      changes:
        - sqlFile:
            path: changes/012-placeholder-and-workflow-columns.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 013-enum-type-constraints
      author: repcheck
      comment: "Convert all finite-value TEXT columns to PostgreSQL ENUM types — 25 enum types covering legislative, analysis, scoring, and pipeline domains"
      changes:
        - sqlFile:
            path: changes/013-enum-type-constraints.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 014-state-column-normalization
      author: repcheck
      comment: "Normalize state columns to 2-letter codes matching us_states.state_code PK; add FK constraints on non-history tables"
      changes:
        - sqlFile:
            path: changes/014-state-column-normalization.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 015-remove-bills-text-embedding
      author: repcheck
      comment: "Remove redundant text_embedding from bills — canonical location is bill_text_versions.embedding (linked via latest_text_version_id FK)"
      changes:
        - sqlFile:
            path: changes/015-remove-bills-text-embedding.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 016-expand-text-version-code-enum
      author: repcheck
      comment: "Add 10 new text version codes from Congress.gov API — PCS, PCH, PL, RDS, RDH, RTS, RTH, ATS, ATH, PP"
      changes:
        - sqlFile:
            path: changes/016-expand-text-version-code-enum.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 017a-add-completed-with-errors-enum
      author: repcheck
      runInTransaction: false
      comment: "Add completed_with_errors to workflow_status_type enum (must run outside transaction)"
      changes:
        - sqlFile:
            path: changes/017a-add-completed-with-errors-enum.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 017b-collapse-pipeline-runs
      author: repcheck
      comment: "Collapse pipeline_runs into workflow_run_steps — two-table execution tracking model, add item counts, migrate processing_results FK"
      changes:
        - sqlFile:
            path: changes/017b-collapse-pipeline-runs.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 018-expand-lis-members
      author: repcheck
      comment: "Add first_name, last_name, party, state, last_verified columns to lis_members table"
      changes:
        - sqlFile:
            path: changes/018-expand-lis-members.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: true

  - changeSet:
      id: 019-restore-member-party-history-unique
      author: repcheck
      comment: "Restore uq_member_party_history UNIQUE (member_id, start_year) dropped as a side-effect of migration 011's TEXT->BIGINT column rebuild"
      changes:
        - sqlFile:
            path: changes/019-restore-member-party-history-unique.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 020-widen-member-party-history-unique
      author: repcheck
      comment: "Widen uq_member_party_history to UNIQUE (member_id, start_year, party_name) so intra-year party switches are preserved instead of silently dropped by ON CONFLICT DO NOTHING"
      changes:
        - sqlFile:
            path: changes/020-widen-member-party-history-unique.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 021-expand-text-version-code-enum
      author: repcheck
      comment: "Add 3 new text version codes from Congress.gov API — RCH (Reference Change House), EAS (Engrossed Amendment Senate), RIS (Referral Instructions Senate)"
      changes:
        - sqlFile:
            path: changes/021-expand-text-version-code-enum.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 022-expand-vote-method-enum
      author: repcheck
      comment: "Add 3 new vote-method values from Congress.gov House vote API — 'yea-and-nay', '2/3 yea-and-nay', 'quorum call'. Lowercased to match existing enum convention."
      changes:
        - sqlFile:
            path: changes/022-expand-vote-method-enum.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 023-vote-positions-lis-member-id
      author: repcheck
      comment: "Dual-identity vote_positions — drop uq_vote_positions, relax member_id to nullable, add lis_member_id FK with XOR CHECK, partial UNIQUE indexes per chamber, and vote_positions_resolved VIEW unifying both arms via member_lis_mapping."
      changes:
        - sqlFile:
            path: changes/023-vote-positions-lis-member-id.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 024-add-candidate-and-election-enum-values
      author: repcheck
      comment: "Speaker-election support: add 'Candidate' to vote_cast_type and 'Election' to vote_type_enum. Split from 025 because PG requires an ALTER TYPE ADD VALUE to commit before its new value can be used."
      changes:
        - sqlFile:
            path: changes/024-add-candidate-and-election-enum-values.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 025-vote-positions-candidate-name
      author: repcheck
      comment: "Add vote_cast_candidate_name TEXT column to vote_positions + vote_history_positions with a CHECK tying it to position='Candidate'. Update the vote_positions_resolved VIEW to include the new column."
      changes:
        - sqlFile:
            path: changes/025-vote-positions-candidate-name.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 026-raw-bill-text
      author: repcheck
      comment: "Create raw_bill_text table (chunked raw text + per-chunk embeddings) and drop content + embedding columns from bill_text_versions. Lets the bill-text pipeline split oversized bills into embedding-model-sized chunks instead of failing with TextContentTooLarge. bill_text_versions becomes pure metadata; raw chunks live in raw_bill_text, nullable-FK'd to the version."
      changes:
        - sqlFile:
            path: changes/026-raw-bill-text.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 027-drop-legacy-votes-natural-key
      author: repcheck
      comment: "Replace the legacy uq_votes_natural_key UNIQUE (congress, chamber, roll_number) constraint with a session-aware composite UNIQUE (congress, chamber, session_number, roll_number) and tighten session_number to NOT NULL. The 3-tuple was not actually unique — Senate roll-call numbers reset each session, so re-ingesting congress 118 session 2 collided with rows from session 1 even though their string natural_keys differ. Defense in depth alongside the existing uq_votes_natural_key_pk on the TEXT natural_key column. Surfaced by the votes-pipeline duplicate-key avalanche during P6 docker-compose validation."
      changes:
        - sqlFile:
            path: changes/027-drop-legacy-votes-natural-key.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false

  - changeSet:
      id: 028-shrink-raw-bill-text-embedding-dims
      author: repcheck
      comment: "Drop and recreate raw_bill_text.embedding as vector(1024) (was vector(1536)) for the bill-text pipeline's swap from qwen3-embedding:4b to qwen3-embedding:0.6b. The 0.6b variant emits 1024 dims via truncated MRL output and reaches GPU saturation at ~50 chunks/batch vs ~10 for the 4B. Drop-and-recreate is safe because raw_bill_text is one migration old and contains only dev / test data; production embeddings backfill on the next pipeline tick (the pipeline already re-embeds rows whose embedding is NULL). HNSW index rebuilt on the new column."
      changes:
        - sqlFile:
            path: changes/028-shrink-raw-bill-text-embedding-dims.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: false
